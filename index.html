<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy & Pharmacology Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <header>
            <h1>Pharmacy Board Quiz</h1>
            <div class="header-controls">
                <div id="progress">Question 1 of 100</div>
                <!-- NEW: Favorite Button -->
                <button id="fav-btn" class="fav-action-btn">☆ Favorite</button>
            </div>
        </header>

        <div id="quiz-box">
            <h2 id="question-text">Loading question...</h2>
            <div id="options-container" class="options-grid"></div>
            <div id="explanation-box" class="explanation hidden"></div>
        </div>

        <footer>
            <div id="score-board">Score: <span id="score">0</span></div>
            <!-- NEW: Navigation Grid Controls -->
            <div class="nav-controls">
                <button id="back-btn" class="nav-btn hidden">Back</button>
                <button id="skip-btn" class="nav-btn">Skip</button>
                <button id="next-btn" class="nav-btn primary-btn hidden">Next</button>
            </div>
        </footer>

        <!-- NEW: Favorite Section display panel -->
        <hr class="section-divider">
        <div class="favorites-section">
            <h3>★ Favorite Questions List</h3>
            <ul id="favorites-list">
                <li>No favorite questions saved yet.</li>
            </ul>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
